version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: table-saas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: table_saas
    ports:
      - "5432:5432"
    volumes:
      - table_saas_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  table_saas_postgres_data:  # уникальное имя с названием проекта